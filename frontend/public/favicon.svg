<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Diagonal Gradient matching the exact color scheme -->
    <linearGradient id="bookLogoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />   <!-- Deep Indigo-Blue (Bottom-Left) -->
      <stop offset="45%" stop-color="#9333ea" />  <!-- Royal Purple (Middle) -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Vibrant Pink-Magenta (Top-Right) -->
    </linearGradient>
  </defs>

  <!-- Squircle Base with exact rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#bookLogoGrad)" />

  <!-- Clean, high-fidelity outline of the open book -->
  <path d="M16 23.5V10.5M16 10.5c-1.5-1-5.5-1-10 .5v11c4.5-1.5 8.5-1.5 10 0M16 10.5c1.5-1 5.5-1 10 .5v11c-4.5-1.5-8.5-1.5-10 0" 
        stroke="#ffffff" 
